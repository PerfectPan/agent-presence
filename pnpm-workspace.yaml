packages:
  - .
  - apps/site

# Supply-chain safety policy. Keep these explicit so dependency-risk changes are
# reviewable in PRs instead of being hidden in a local package-manager default.
minimumReleaseAge: 1440
minimumReleaseAgeStrict: true
minimumReleaseAgeIgnoreMissingTime: false
blockExoticSubdeps: true
strictDepBuilds: true
pmOnFail: error
engineStrict: true
verifyDepsBeforeRun: error

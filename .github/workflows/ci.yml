name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Install libsecret (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gnome-keyring dbus-x11 libsecret-tools
          echo "secret-tool path:" && which secret-tool || echo "  NOT FOUND"

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - run: pnpm test

      - run: pnpm run typecheck

      - run: pnpm run build

      - run: pnpm pack --dry-run

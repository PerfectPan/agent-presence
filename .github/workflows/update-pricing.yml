name: Update Pricing Snapshot

on:
  workflow_dispatch:
  schedule:
    # LiteLLM pricing changes occasionally; weekly is enough for a local status CLI.
    - cron: '17 2 * * 1'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-pricing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm run update-pricing

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(usage): update LiteLLM pricing snapshot'
          title: 'chore(usage): update LiteLLM pricing snapshot'
          body: |
            Regenerates `src/usage/litellm-pricing.json` from LiteLLM for the
            supported model allowlist in `scripts/update-pricing.mjs`.
          branch: chore/update-pricing-snapshot
          delete-branch: true
